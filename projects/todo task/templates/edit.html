<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Edit Task</h2>
        <form action="/edit/{{ task_id }}" method="POST" class="mb-3 row g-2 align-items-end">
            <div class="col-12">
                <input type="text" name="task" class="form-control mb-2" value="{{ task.content }}" required>
            </div>
            <div class="col-6">
                <input type="datetime-local" name="deadline" class="form-control mb-2" value="{{ task.deadline }}">
            </div>
            <div class="col-6">
                <select name="category" class="form-select mb-2">
                    <option value="" {% if not task.category %}selected{% endif %}>Category</option>
                    <option value="Work" {% if task.category=='Work' %}selected{% endif %}>Work</option>
                    <option value="Study" {% if task.category=='Study' %}selected{% endif %}>Study</option>
                    <option value="Personal" {% if task.category=='Personal' %}selected{% endif %}>Personal</option>
                </select>
            </div>
            <div class="col-12 mb-2">
                <small class="text-muted">Added: {{ task.created_at if task.created_at else 'N/A' }}</small>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success">Save</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
